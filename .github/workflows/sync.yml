name: Sync full linphone-desktop to GitHub
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Show current path
        run: |
          echo "====================================="
          echo "当前工作目录：$(pwd)"
          echo "====================================="

      - name: Clone full repo (all versions, all branches)
        run: |
          echo "开始克隆 linphone-desktop 全部代码..."
          git clone https://gitlab.linphone.org/BC/public/linphone-desktop.git source
          echo "====================================="
          echo "克隆完成，文件在 source/ 目录"
          echo "====================================="

      - name: Move everything to root
        run: |
          echo "把源码移动到仓库根目录..."
          shopt -s dotglob
          mv source/* .
          rm -rf source
          echo "当前目录结构："
          ls -la
          echo "====================================="

      - name: Init all submodules (full source)
        run: |
          echo "开始拉取所有子模块依赖源码..."
          git submodule update --init --recursive --progress
          echo "====================================="
          echo "✅ 所有子模块拉取完成"
          echo "====================================="

      - name: Push to your GitHub
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add .
          git commit -m "Full linphone-desktop + all submodules & all versions"
          git push --force
          echo "====================================="
          echo "✅ 全部同步完成！"
          echo "仓库：https://github.com/${{ github.repository }}"
          echo "====================================="
