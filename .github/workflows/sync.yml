name: Mirror Full Repo to GitHub
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Show directory
        run: |
          echo "当前目录：$(pwd)"
          
      - name: Full mirror clone (all versions, all submodules)
        run: |
          echo "===== 开始完整镜像克隆 ====="
          git clone --mirror https://gitlab.linphone.org/BC/public/linphone-desktop.git repo
          echo "===== 克隆完成 ====="

      - name: Push to your GitHub
        run: |
          cd repo
          echo "===== 开始推送全部代码到你的仓库 ====="
          git push --mirror https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          echo "===== ✅ 全部同步成功！ ====="
