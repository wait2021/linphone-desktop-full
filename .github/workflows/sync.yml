name: Clone to Your Repo (100% FIXED)
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Clone source to root
        run: |
          GREEN="\033[32m"
          NC="\033[0m"
          echo -e "${GREEN}当前工作目录：$(pwd)${NC}"

          git clone https://gitlab.linphone.org/BC/public/linphone-desktop.git .

          git submodule init
          git config -f .gitmodules --get-regexp '^submodule\..*\.url$' | while read -r key url; do
            name=$(echo "$key" | sed -E 's/^submodule\.(.*)\.url$/\1/')
            path=$(git config -f .gitmodules "submodule.$name.path")
            
            start=$(date +"%Y-%m-%d %H:%M:%S")
            echo "开始克隆子模块[ $start ]：$name  地址：$url"

            git submodule update --init "$path"

            end=$(date +"%Y-%m-%d %H:%M:%S")
            filecount=$(find "$path" -type f | wc -l)
            abspath=$(realpath "$path")

            echo "克隆完成[ $end ][ 文件数：$filecount ]：$name  存储位置：$abspath"
            echo "-------------------------------------"
          done

          find . -name ".git" -o -name ".gitmodules" | grep -v "^./.git" | xargs rm -rf

      - name: Push to YOUR repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Full source"
          git push --force https://github.com/wait2021/linphone-desktop-full.git main

          echo "✅ 推送成功！"
